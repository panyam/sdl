syntax = "proto3";

package sdl.v1;

import "sdl/v1/models/models.proto";

option go_package = "github.com/panyam/sdl/gen/go/sdl/v1/models";

// ============================================================================
// DevEnvPage Messages — typed panel updates pushed from DevEnv to the UI
// ============================================================================

// System panel

message DevEnvSystemChangedRequest {
  string system_name = 1;
  // Full list of available systems after the change
  repeated string available_systems = 2;
}

message DevEnvSystemChangedResponse {}

message DevEnvAvailableSystemsRequest {
  repeated string system_names = 1;
}

message DevEnvAvailableSystemsResponse {}

// Generator panel (CRUD by name)

message DevEnvUpdateGeneratorRequest {
  string name = 1;
  Generator generator = 2;
}

message DevEnvUpdateGeneratorResponse {}

message DevEnvRemoveGeneratorRequest {
  string name = 1;
}

message DevEnvRemoveGeneratorResponse {}

// Metric panel (CRUD by name)

message DevEnvUpdateMetricRequest {
  string name = 1;
  Metric metric = 2;
}

message DevEnvUpdateMetricResponse {}

message DevEnvRemoveMetricRequest {
  string name = 1;
}

message DevEnvRemoveMetricResponse {}
