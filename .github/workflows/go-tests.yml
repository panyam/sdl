name: Go Tests

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install goyacc
        run: go install golang.org/x/tools/cmd/goyacc@latest

      - name: Regenerate parser
        working-directory: lib/parser
        run: goyacc -o parser.go -p "SDL" grammar.y

      - name: Parser tests
        run: go test ./lib/parser/ -count=1 -timeout 30s

      - name: Loader tests
        run: go test ./lib/loader/ -count=1 -timeout 30s

      - name: Runtime tests
        run: go test ./lib/runtime/ -run "TestUnifiedSystem|TestFlowEvalBasic|TestFlowEvalComparison|TestFlowEvalRuntime|TestSolveSystemFlowsRuntime|TestCacheHitRate" -count=1 -timeout 60s

      - name: Services tests
        run: go test ./services/ -count=1 -timeout 60s
