{{# include "BasePage.html" #}}

{{define "ExtraHeadSection"}}
<style>
    /* App container fills remaining space below header using flex */
    #app {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
</style>
{{end}}

{{define "BodySection"}}
<!-- Empty - dockview renders inside #app which is a flex child below header -->
{{end}}

{{define "PostBodySection"}}
<!-- Embed SDL design files for browser-side loading via ScriptTagFS.
     Uses hidden textareas to avoid Go template HTML/JS escaping. -->
{{range $name, $content := .DesignFiles}}
<textarea class="sdl-design-source" data-design="{{$name}}" style="display:none">{{$content}}</textarea>
{{end}}

<script>
    // Set up page data for the frontend
    window.sdlPageData = {
        pageType: 'workspace-dashboard',
        workspaceId: '{{.WorkspaceId}}',
        workspaceName: '{{.Workspace.Name}}',
        mode: 'server',
        readonly: {{.ReadOnly}},
        // Collect design names from embedded textarea tags
        designs: Array.from(document.querySelectorAll('textarea.sdl-design-source'))
            .map(el => el.dataset.design)
            .filter(Boolean)
    };
</script>
{{end}}

{{define "WorkspacePage"}}
{{template "BasePage" .}}
{{end}}
