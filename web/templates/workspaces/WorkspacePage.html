{{# include "BasePage.html" #}}

{{define "ExtraHeadSection"}}
<style>
    /* App container fills remaining space below header using flex */
    #app {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
</style>
{{end}}

{{define "BodySection"}}
<!-- Empty - dockview renders inside #app which is a flex child below header -->
{{end}}

{{define "PostBodySection"}}
<!-- Embed SDL design files as script tags for browser-side loading -->
{{range $name, $content := .DesignFiles}}
<script type="text/sdl" data-design="{{$name}}">
{{$content}}
</script>
{{end}}

<script>
    // Set up page data for the frontend
    window.sdlPageData = {
        pageType: 'canvas-dashboard',
        canvasId: '{{.WorkspaceId}}',
        canvasName: '{{.Canvas.Name}}',
        mode: 'server',
        readonly: {{.ReadOnly}},
        // Collect design names from embedded script tags
        designs: Array.from(document.querySelectorAll('script[type="text/sdl"]'))
            .map(el => el.dataset.design)
            .filter(Boolean)
    };
</script>
{{end}}

{{define "WorkspacePage"}}
{{template "BasePage" .}}
{{end}}
